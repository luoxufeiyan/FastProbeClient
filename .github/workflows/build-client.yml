name: Build FastProbe Client

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        cache-dependency-path: client/go.sum

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        cd client
        go build -v -o fastprobe-client-${{ matrix.goos }}-${{ matrix.goarch }} ./main.go

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: fastprobe-client-${{ matrix.goos }}-${{ matrix.goarch }}
        path: client/fastprobe-client-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v3
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/fastprobe-client-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
